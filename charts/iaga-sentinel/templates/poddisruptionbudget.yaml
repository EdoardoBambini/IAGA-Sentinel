{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "iaga-sentinel.fullname" . }}
  labels:
    {{- include "iaga-sentinel.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "iaga-sentinel.selectorLabels" . | nindent 6 }}
  {{- with .Values.podDisruptionBudget.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
{{- end }}
