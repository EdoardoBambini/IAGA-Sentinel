{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "iaga-sentinel.fullname" . }}
  labels:
    {{- include "iaga-sentinel.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "iaga-sentinel.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
      {{- if .Values.networkPolicy.ingressRules }}
      {{- toYaml .Values.networkPolicy.ingressRules | nindent 4 }}
      {{- end }}
  egress:
    {{- if .Values.networkPolicy.egressRules }}
    {{- toYaml .Values.networkPolicy.egressRules | nindent 4 }}
    {{- end }}
{{- end }}
