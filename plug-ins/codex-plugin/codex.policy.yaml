# IAGA Sentinel - policy that registers the "codex" agent so the
# `iaga-codex hook` gate can govern OpenAI Codex CLI tool calls.
#
# IMPORTANT: the Codex gate fails CLOSED by default. Without this profile an
# unregistered agentId returns 404 and the gate blocks every tool call until
# you import it (the claude-code hook fails open instead; this gate is an
# enforcement point, not an observer). Import it once:
#
#     iaga import plug-ins/codex-plugin/codex.policy.yaml
#
# or copy it to ./iaga-sentinel.yaml, which the server auto-imports on boot.
#
# Decisions default to "allow" so every tool call still produces a signed
# receipt, while the injection firewall independently blocks dangerous
# payloads (e.g. exfiltration via "curl -d @.env ...") regardless of these
# settings. Tighten any tool to maxDecision: review to require human approval.
#
# PROVISIONAL: the tool names below follow the Codex documentation as
# understood at design time; pin them against the captured payloads when the
# spike fixtures land (see README.md). Unknown/unlisted tool names (including
# MCP "<server>:<tool>" calls) are escalated by the risk pipeline.

profiles:
  - agentId: codex
    workspaceId: ws-codex
    framework: codex
    role: builder
    approvedTools:
      - shell
      - local_shell
      - exec_command
      - apply_patch
      - read_file
      - view_image
      - web_search
      - update_plan
    approvedSecrets: []
    baselineActionTypes:
      - shell
      - file_read
      - file_write
      - http

workspaces:
  - workspaceId: ws-codex
    allowedProtocols:
      - http-function
      - mcp
    allowedDomains:
      - "*"
    tools:
      - toolName: shell
        allowedActionTypes: [shell]
        maxDecision: allow
        requiresHumanReview: false
      - toolName: local_shell
        allowedActionTypes: [shell]
        maxDecision: allow
        requiresHumanReview: false
      - toolName: exec_command
        allowedActionTypes: [shell]
        maxDecision: allow
        requiresHumanReview: false
      - toolName: apply_patch
        allowedActionTypes: [file_write]
        maxDecision: allow
        requiresHumanReview: false
      - toolName: read_file
        allowedActionTypes: [file_read]
        maxDecision: allow
        requiresHumanReview: false
      - toolName: view_image
        allowedActionTypes: [file_read]
        maxDecision: allow
        requiresHumanReview: false
      - toolName: web_search
        allowedActionTypes: [http]
        maxDecision: allow
        requiresHumanReview: false
      - toolName: update_plan
        allowedActionTypes: [custom]
        maxDecision: allow
        requiresHumanReview: false

vault: []
