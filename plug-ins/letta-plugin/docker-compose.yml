# Drop-in quickstart: a stock IAGA Sentinel sidecar (open mode, no auth) plus an
# open-source Letta server. For local demos only.
#
#   docker compose up sentinel letta      # sidecar on :4010, Letta on :8283
#
# Open mode (IAGA_SENTINEL_OPEN_MODE=true) and SECURE=false are for local demos.
# In production, drop open mode + pass IAGA_SENTINEL_API_KEY, and set SECURE=true
# with a LETTA_SERVER_PASSWORD. Letta needs an LLM key (e.g. OPENAI_API_KEY) to give
# the agent a brain — pass it through the `letta` service environment.
services:
  sentinel:
    image: ghcr.io/edoardobambini/iaga-sentinel:v1.8.1
    command: ["serve"]
    environment:
      IAGA_SENTINEL_OPEN_MODE: "true"
      PORT: "4010"
    ports:
      - "4010:4010"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4010/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  letta:
    image: letta/letta:latest
    environment:
      SECURE: "false"
      # OPENAI_API_KEY: "sk-..."   # or ANTHROPIC_API_KEY, etc. — the agent's brain
    ports:
      - "8283:8283"
    volumes:
      - letta-pgdata:/var/lib/postgresql/data

volumes:
  letta-pgdata:
