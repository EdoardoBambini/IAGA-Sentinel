# Registers the "openai-demo" agent.
#   iaga import examples/integrations/openai/openai.policy.yaml
profiles:
  - agentId: openai-demo
    workspaceId: ws-openai
    framework: openai
    role: builder
    approvedTools: [openai.chat.completions.create, openai.responses.create]
    approvedSecrets: [OPENAI_API_KEY]
    baselineActionTypes: [http]
workspaces:
  - workspaceId: ws-openai
    allowedProtocols: [http-function, mcp]
    allowedDomains: ["*"]
    tools:
      - { toolName: openai.chat.completions.create, allowedActionTypes: [http], maxDecision: allow, requiresHumanReview: false }
      - { toolName: openai.responses.create, allowedActionTypes: [http], maxDecision: allow, requiresHumanReview: false }
vault: []
