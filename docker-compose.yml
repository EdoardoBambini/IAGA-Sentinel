services:
  iaga-sentinel:
    build: .
    ports:
      - "4010:4010"
    volumes:
      - iaga-sentinel-data:/app/data
    environment:
      - PORT=4010
      - DATABASE_URL=sqlite:///app/data/iaga_sentinel.db?mode=rwc
      - IAGA_SENTINEL_OPEN_MODE=false
      - IAGA_SENTINEL_NHI_MASTER_SEED=${IAGA_SENTINEL_NHI_MASTER_SEED}
    restart: unless-stopped

volumes:
  iaga-sentinel-data:
