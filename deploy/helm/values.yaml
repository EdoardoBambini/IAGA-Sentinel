image:
  repository: ghcr.io/edoardobambini/iaga-sentinel
  tag: "1.9.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4010

# Passed straight through as container env. DATABASE_URL points at an
# in-container SQLite file; for durability across restarts mount a PVC or
# point at Postgres (see deploy/README.md).
env:
  PORT: "4010"
  IAGA_SENTINEL_DEFAULT_MODE: sidecar
  DATABASE_URL: "sqlite:///app/data/iaga_sentinel.db?mode=rwc"

resources: {}
