name: CI

on:
  push:
    branches: [main, master, "feat/1.0-**"]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (fmt + clippy + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Security audit
        # Ignores documented in crates/iaga-sentinel-core/.cargo/audit.toml. Passed explicitly
        # because cargo-audit's project-local config discovery is version-dependent.
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2025-0057 --ignore RUSTSEC-2024-0436

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests (default features)
        run: cargo test --workspace

      - name: Run iaga-sentinel-reasoning tests with `ml` feature (tract-onnx)
        run: cargo test -p iaga-sentinel-reasoning --features ml

      - name: Validate example plugin path
        run: cargo test -p iaga-sentinel-core --features plugins --test plugin_example_tests

      - name: Build TypeScript SDK
        working-directory: sdks/typescript
        run: |
          npm ci
          npm run build

      - name: Compile Python SDK
        working-directory: sdks/python
        run: python -m compileall iaga_sentinel

      - name: Build UI (for ui-embed)
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Verify ui-embed feature compiles
        run: cargo build -p iaga-sentinel-core --features ui-embed

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build release binary
        run: cargo build --release --workspace

      - name: Smoke-test CLI surface (1.0)
        run: |
          ./target/release/iaga --help
          ./target/release/iaga kernel status
          ./target/release/iaga reasoning info
          ./target/release/iaga policy lint crates/iaga-sentinel-apl/examples/no_pii_egress.apl
          ./target/release/iaga policy test crates/iaga-sentinel-apl/examples/no_pii_egress.apl --context crates/iaga-sentinel-apl/examples/sample_context.json

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: iaga-sentinel-binary
          path: target/release/iaga-sentinel

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: iaga-sentinel-binary

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: iaga-sentinel
          generate_release_notes: true
