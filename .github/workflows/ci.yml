name: CI

on:
  push:
    branches: [main, master, "feat/1.0-**", "feat/1.2-**"]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (fmt + clippy + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Security audit
        # Ignores live in .cargo/audit.toml (repo root, auto-discovered) —
        # single source of truth, no duplicated CLI flags (1.5.2).
        run: cargo audit

  notices:
    # Third-party attribution for the shipped binary must stay in sync with
    # Cargo.lock. Regenerate THIRD_PARTY_NOTICES.md and fail if it drifted.
    name: Third-party notices in sync
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-notices-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-notices-

      - name: Install cargo-about (pinned for deterministic output)
        run: cargo install cargo-about --version 0.9.0 --locked --features cli

      - name: Regenerate THIRD_PARTY_NOTICES.md and check it is committed
        run: |
          cargo about generate about.hbs > /tmp/notices.generated.md
          if ! diff <(tr -d '\r' < THIRD_PARTY_NOTICES.md) <(tr -d '\r' < /tmp/notices.generated.md) >/dev/null; then
            echo "::error::THIRD_PARTY_NOTICES.md is out of date with Cargo.lock. Regenerate it with: cargo about generate about.hbs > THIRD_PARTY_NOTICES.md"
            diff <(tr -d '\r' < THIRD_PARTY_NOTICES.md) <(tr -d '\r' < /tmp/notices.generated.md) | head -60 || true
            exit 1
          fi
          echo "THIRD_PARTY_NOTICES.md is in sync with Cargo.lock."

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    env:
      # Keep the runner's disk from filling during the heavy all-features build
      # (wasmtime + tract-onnx + every feature): no debug symbols, no incremental dir.
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-C debuginfo=0"
    services:
      # Live Postgres for the receipts/core postgres-feature suites (1.5.2).
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        # The all-features test step compiles every feature into one target/ and
        # exhausted the ~14 GB runner. Reclaim ~20 GB of preinstalled tooling the
        # build never uses (Android SDK, .NET, GHC, CodeQL, preloaded images).
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests (default features)
        run: cargo test --workspace

      - name: Run iaga-sentinel-reasoning tests with `ml` feature (tract-onnx)
        run: cargo test -p iaga-sentinel-reasoning --features ml

      - name: Validate example plugin path
        run: cargo test -p iaga-sentinel-core --features plugins --test plugin_example_tests

      - name: Run iaga-sentinel-dictum tests with `dictum-wasm` feature (1.2)
        run: cargo test -p iaga-sentinel-dictum --features dictum-wasm

      - name: Run iaga-sentinel-core lib tests with `plugin-attestation` feature (1.2)
        run: cargo test -p iaga-sentinel-core --features plugins,plugin-attestation --lib

      - name: Run iaga-sentinel-core lib tests with `otel-receipts` feature (1.3)
        run: cargo test -p iaga-sentinel-core --features otel-receipts --lib

      - name: Run iaga-sentinel-core lib tests with `plugin-manifest-signing` feature (1.3)
        run: cargo test -p iaga-sentinel-core --features plugin-manifest-signing --lib

      - name: Run iaga-sentinel-core tests with `cost-control` feature (1.5)
        run: cargo test -p iaga-sentinel-core --features cost-control

      - name: Run iaga-sentinel-receipts tests with `postgres` feature (1.5.2, live DB)
        run: cargo test -p iaga-sentinel-receipts --features postgres
        env:
          IAGA_SENTINEL_TEST_PG_URL: postgres://sentinel:sentinel@localhost:5432/sentinel_test

      - name: Run iaga-sentinel-core tests with `postgres` feature (1.5.2)
        run: cargo test -p iaga-sentinel-core --features postgres
        env:
          IAGA_SENTINEL_TEST_PG_URL: postgres://sentinel:sentinel@localhost:5432/sentinel_test

      - name: Build iaga-sentinel-kernel with `linux-bpf` (scaffold compile check, 1.5.2)
        run: cargo build -p iaga-sentinel-kernel --features linux-bpf

      - name: Run workspace tests with all features combined (1.5.2)
        # First job that compiles every feature together (sqlite+postgres+ml+
        # plugins+dictum-wasm+linux-bpf+cost-control+…) to catch feature-gate
        # interactions no single-feature step can see.
        run: cargo test --workspace --all-features
        env:
          IAGA_SENTINEL_TEST_PG_URL: postgres://sentinel:sentinel@localhost:5432/sentinel_test

      - name: Build TypeScript SDK
        working-directory: sdks/typescript
        run: |
          npm ci
          npm run build

      - name: Compile Python SDK
        working-directory: sdks/python
        run: python -m compileall iaga_sentinel

      - name: SDK e2e smoke against a live sidecar (1.5.2)
        # Until 1.5.2 the SDK suites never ran in CI: the Python adapter tests
        # auto-skip without a sidecar and the TS smoke needed a registered
        # agent pool. This step closes both gaps with the real binary.
        env:
          IAGA_SENTINEL_OPEN_MODE: "true"
          IAGA_BIN: ${{ github.workspace }}/target/debug/iaga
          IAGA_BASE_URL: http://127.0.0.1:4010
        run: |
          set -euo pipefail
          cargo build -p iaga-sentinel-core --bin iaga
          ./target/debug/iaga serve --seed-demo &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            curl -fsS "$IAGA_BASE_URL/health" >/dev/null 2>&1 && break
            sleep 0.5
          done
          curl -fsS "$IAGA_BASE_URL/health"
          # Python SDK: framework-free adapter tests driving the live sidecar
          # (tests/e2e needs the actual agent frameworks installed and stays local-only).
          pip install --quiet pytest httpx requests
          python -m pytest sdks/python/tests --ignore sdks/python/tests/e2e -q
          # TypeScript SDK: register a fresh agent pool, then run the smoke checks.
          IAGA_SMOKE_AGENTS="$(node sdks/typescript/register-smoke-agents.cjs)" \
            node sdks/typescript/smoke.cjs

      - name: Offline verifier parity smoke (Node, node:crypto)
        # The Node half of the multilingual verifier (roadmap 1.3): reach the
        # canonical Rust verdict on the Rust-signed golden vector + RFC 8032 KAT,
        # dependency-free. No sidecar needed.
        run: node sdks/typescript/verify.smoke.mjs

  # Verifier sovereignty (roadmap 1.3): the dependency-free Python verifier must
  # reach the canonical Rust verdict on every stack. Pure stdlib (vendored
  # Ed25519 RFC 8032), so this matrix needs no sidecar and no Rust toolchain.
  python:
    name: python
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Dependency-free verifier vs the Rust-signed golden vector
        run: python sdks/python/iaga_verify.py sdks/conformance/golden_chain.json --key ea4a6c63e29c520abef5507b132ec5f9954776aebebe7b92421eea691446d22c

      - name: Verifier unit tests (stdlib only)
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pytest sdks/python/tests/test_iaga_verify.py -q

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build release binary
        run: cargo build --release --workspace

      - name: Smoke-test CLI surface (1.0)
        run: |
          ./target/release/iaga --help
          ./target/release/iaga kernel status
          ./target/release/iaga reasoning info
          ./target/release/iaga policy lint crates/iaga-sentinel-dictum/examples/no_pii_egress.dictum
          ./target/release/iaga policy test crates/iaga-sentinel-dictum/examples/no_pii_egress.dictum --context crates/iaga-sentinel-dictum/examples/sample_context.json

      - name: Receipt conformance suite (1.9 badge)
        run: ./target/release/iaga-verify --conformance sdks/conformance/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: iaga-sentinel-binary
          path: target/release/iaga-sentinel

  compile-sanity:
    # 1.5.2: promoted to a blocking status. Windows is the primary dev
    # platform (the workspace builds there daily) and macOS has no
    # platform-specific code outside #[cfg(unix)] gates, so a failure
    # here is a real regression, not expected flakiness.
    name: Compile sanity (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-sanity-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sanity-
      - name: Build workspace (no tests)
        run: cargo build --workspace

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: iaga-sentinel-binary

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: iaga-sentinel
          generate_release_notes: true

  # 1.9: signed, cross-platform release artifacts. Build-time cosign signing +
  # SLSA build provenance make the binary that mints receipts itself verifiable.
  # Note: this only *produces* provenance/signatures for the release archives.
  # Verify-time Rekor inclusion-proof verification and qualified/eIDAS signing
  # remain Enterprise (ADR 0010 / ADR 0013); the OSS boundary is unchanged.
  release-artifacts:
    name: Release artifacts (${{ matrix.target.os }})
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write      # upload release assets
      id-token: write      # cosign keyless + provenance OIDC
      attestations: write  # attest-build-provenance
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: linux,   runner: ubuntu-latest,  ext: "",     archive: tar.gz }
          - { os: macos,   runner: macos-latest,   ext: "",     archive: tar.gz }
          - { os: windows, runner: windows-latest, ext: ".exe", archive: zip }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --workspace --bins

      - name: Stage + archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ext="${{ matrix.target.ext }}"
          cp "target/release/iaga${ext}" "dist/iaga${ext}"
          cp "target/release/iaga-verify${ext}" "dist/iaga-verify${ext}"
          cd dist
          pkg="iaga-sentinel-${GITHUB_REF_NAME}-${{ matrix.target.os }}"
          if [ "${{ matrix.target.archive }}" = "zip" ]; then
            7z a "${pkg}.zip" "iaga${ext}" "iaga-verify${ext}"
            asset="${pkg}.zip"
          else
            tar czf "${pkg}.tar.gz" "iaga${ext}" "iaga-verify${ext}"
            asset="${pkg}.tar.gz"
          fi
          # Portable checksum: sha256sum on Linux, shasum on macOS.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "${asset}.sha256"
          else
            shasum -a 256 "$asset" > "${asset}.sha256"
          fi
          echo "ASSET=dist/${asset}" >> "$GITHUB_ENV"

      - uses: sigstore/cosign-installer@v3

      - name: Sign archive (cosign keyless)
        shell: bash
        run: cosign sign-blob --yes --bundle "${ASSET}.cosign.bundle" "${ASSET}"

      - name: Attest SLSA build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ env.ASSET }}

      - name: Upload signed artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
            ${{ env.ASSET }}.cosign.bundle
