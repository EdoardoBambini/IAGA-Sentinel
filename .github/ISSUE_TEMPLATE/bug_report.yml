name: Bug Report
description: Report a bug in IAGA Sentinel
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Start the server with '...'
        2. Send request '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Environment
      options:
        - Linux
        - macOS
        - Windows
        - Docker
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: IAGA Sentinel Version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, screenshots, config snippets, etc.
    validations:
      required: false
