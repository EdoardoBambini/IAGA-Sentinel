# IAGA Sentinel - Policy Configuration Example
# Copy this to iaga-sentinel.yaml and customize for your environment.
# The server auto-imports this file on first boot.

profiles:
  - agentId: builder-01
    workspaceId: ws-default
    framework: langchain
    role: builder
    approvedTools:
      - file.read
      - file.write
      - terminal.exec
    approvedSecrets:
      - OPENAI_API_KEY
    baselineActionTypes:
      - file_read
      - file_write
      - shell

  - agentId: researcher-01
    workspaceId: ws-default
    framework: crewai
    role: researcher
    approvedTools:
      - http.fetch
      - file.read
    approvedSecrets: []
    baselineActionTypes:
      - http
      - file_read

  - agentId: operator-01
    workspaceId: ws-default
    framework: mcp
    role: operator
    approvedTools:
      - db.query
      - http.fetch
      - terminal.exec
    approvedSecrets:
      - DATABASE_URL
      - OPENAI_API_KEY
    baselineActionTypes:
      - db_query
      - http
      - shell

workspaces:
  - workspaceId: ws-default
    allowedProtocols:
      - mcp
      - http-function
    allowedDomains:
      - "*.openai.com"
      - "api.anthropic.com"
      - "*.github.com"
    tools:
      - toolName: file.read
        allowedActionTypes:
          - file_read
        maxDecision: allow
        requiresHumanReview: false

      - toolName: file.write
        allowedActionTypes:
          - file_write
        maxDecision: review
        requiresHumanReview: false

      - toolName: terminal.exec
        allowedActionTypes:
          - shell
        maxDecision: review
        requiresHumanReview: true

      - toolName: http.fetch
        allowedActionTypes:
          - http
        maxDecision: allow
        requiresHumanReview: false

      - toolName: db.query
        allowedActionTypes:
          - db_query
        maxDecision: review
        requiresHumanReview: false

vault: []
