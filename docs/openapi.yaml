          application/json:
            schema:
              type: object
              required: [agentId, challengeId, signature]
              properties:
                agentId:
                  type: string
                challengeId:
                  type: string
                signature:
                  type: string
                  description: Hex-encoded HMAC-SHA256 signature of the challenge
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: Attestation verification outcome (verified flag, trust update)
        "401":
          $ref: "#/components/responses/Unauthorized"

