openapi: 3.1.0
info:
  title: IAGA Sentinel API
  version: 1.5.2
  description: >
    IAGA Sentinel is the EU AI Act conformity evidence layer for AI agents.
    It intercepts tool calls, evaluates risk against typed policies, and
    produces Ed25519-signed, replay-verifiable receipts across an 8-layer
    governance pipeline (two of them advisory), structured to support AI Act
    Article 12 record-keeping and to help produce Annex IV technical documentation.


    Since 1.5.2 API keys carry a scope: `admin` (default — full access,
    identical to pre-1.5.2 keys) or `agent` (governance surface only).
    Operations marked "admin scope" reject agent-scoped keys with
    `403 admin_scope_required`. Endpoints under the `cost-control` feature
    respond with `{"enabled": false}` when the server was compiled without it.
  license:
    name: BUSL-1.1
    url: https://spdx.org/licenses/BUSL-1.1.html
  contact:
    name: IAGA Sentinel Team
    url: https://github.com/EdoardoBambini/IAGA-Sentinel

servers:
  - url: http://localhost:4010
    description: Local development server

security:
  - bearerAuth: []

tags:
  - name: Core
    description: Primary governance pipeline
  - name: Audit
    description: Immutable audit log
  - name: Reviews
    description: Human-in-the-loop review queue
  - name: Profiles
    description: Agent profile CRUD
  - name: Workspaces
    description: Workspace policy CRUD
  - name: Auth
    description: API key management
  - name: Webhooks
    description: Webhook registration and management
  - name: Events
    description: Server-sent event stream
  - name: Sessions
    description: "L1: Session graph tracking"
  - name: NHI
    description: "L3: Non-human identity management"
  - name: Risk
    description: "L4: Adaptive risk scoring"
  - name: Sandbox
    description: "L5: Sandbox execution review"
  - name: Policy
    description: "L6: Formal policy verification"
  - name: Firewall
    description: "L7: Prompt injection firewall"
  - name: Telemetry
    description: "L8: OpenTelemetry spans and metrics"
  - name: Dashboard
    description: Web dashboard UI
  - name: ResponseScanning
    description: Agent response output scanning for sensitive data
  - name: RateLimiting
    description: Per-agent rate limiting and throttling
  - name: Fingerprinting
    description: Behavioral agent fingerprinting
  - name: ThreatIntel
    description: Threat intelligence indicator management
  - name: Demo
    description: Demo scenarios and adapter runner
  - name: Analytics
    description: Per-agent audit analytics
  - name: Receipts
    description: "M2: Ed25519-signed receipt chains (read API)"
  - name: Cost
    description: "1.5 cost-control: spend observability and budget (feature-gated)"
  - name: PolicyOverlay
    description: "M6: Dictum live policy overlay status"
  - name: Reasoning
    description: "M3.5: ML reasoning plane status"
  - name: Kernel
    description: "M4: enforcement kernel posture"
  - name: Templates
    description: Built-in policy templates
  - name: Plugins
    description: WASM plugin registry

paths:
  /:
    get:
      operationId: getDashboard
      summary: Render the web dashboard
      tags: [Dashboard]
      security: []
      responses:
        "200":
          description: HTML dashboard page
          content:
            text/html:
              schema:
                type: string

  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [Core]
      security: []
      responses:
        "200":
          description: Service health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /dashboard/context:
    get:
      operationId: getDashboardContext
      summary: Public context for the dashboard (same payload as /health)
      tags: [Dashboard]
      security: []
      responses:
        "200":
          description: Service health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/inspect:
    post:
      operationId: inspectAction
      summary: Submit an agent action for governance evaluation
      tags: [Core]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InspectRequest"
      responses:
        "200":
          description: Governance result with decision, risk, audit trail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/audit:
    get:
      operationId: listAuditEvents
      summary: List recent audit events
      tags: [Audit]
      responses:
        "200":
          description: Array of stored audit events (most recent 100)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoredAuditEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/audit/export:
    get:
      operationId: exportAuditEvents
      summary: Export filtered audit events as JSON or CSV
      tags: [Audit]
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
        - name: tenant_id
          in: query
          schema:
            type: string
        - name: agent_id
          in: query
          schema:
            type: string
        - name: decision
          in: query
          schema:
            $ref: "#/components/schemas/GovernanceDecision"
        - name: from_date
          in: query
          schema:
            type: string
            format: date-time
        - name: to_date
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 1000
      responses:
        "200":
          description: Filtered audit events (JSON array or CSV body)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoredAuditEvent"
            text/csv:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/audit/stats:
    get:
      operationId: getAuditStats
      summary: Aggregate audit statistics (totals, decisions, top agents/tools)
      tags: [Audit]
      responses:
        "200":
          description: Aggregate audit statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/analytics/agents:
    get:
      operationId: listAgentAnalytics
      summary: Per-agent audit analytics for all agents
      tags: [Analytics]
      responses:
        "200":
          description: Array of per-agent analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentAnalytics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/analytics/agents/{agent_id}:
    get:
      operationId: getAgentAnalytics
      summary: Per-agent audit analytics for one agent
      tags: [Analytics]
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Analytics for the requested agent
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentAnalytics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/reviews:
    get:
      operationId: listReviews
      summary: List all pending and resolved reviews
      tags: [Reviews]
      responses:
        "200":
          description: Array of review requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/reviews/{id}:
    post:
      operationId: resolveReview
      summary: Approve or reject a pending review
      tags: [Reviews]
      parameters:
        - $ref: "#/components/parameters/ReviewId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewBody"
      responses:
        "200":
          description: Updated review request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/profiles:
    get:
      operationId: listProfiles
      summary: List all agent profiles
      tags: [Profiles]
      responses:
        "200":
          description: Array of agent profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createProfile
      summary: Create or update an agent profile
      tags: [Profiles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentProfile"
      responses:
        "200":
          description: Upserted agent profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/profiles/{agent_id}:
    get:
      operationId: getProfile
      summary: Get an agent profile by ID
      tags: [Profiles]
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      operationId: updateProfile
      summary: Update an agent profile
      tags: [Profiles]
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentProfile"
      responses:
        "200":
          description: Updated agent profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: deleteProfile
      summary: Delete an agent profile
      tags: [Profiles]
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "204":
          description: Profile deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/workspaces:
    get:
      operationId: listWorkspaces
      summary: List all workspace policies
      tags: [Workspaces]
      responses:
        "200":
          description: Array of workspace policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspacePolicy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createWorkspace
      summary: Create or update a workspace policy
      tags: [Workspaces]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspacePolicy"
      responses:
        "200":
          description: Upserted workspace policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacePolicy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/workspaces/{workspace_id}:
    get:
      operationId: getWorkspace
      summary: Get a workspace policy by ID
      tags: [Workspaces]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacePolicy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      operationId: updateWorkspace
      summary: Update a workspace policy
      tags: [Workspaces]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspacePolicy"
      responses:
        "200":
          description: Updated workspace policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacePolicy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: deleteWorkspace
      summary: Delete a workspace policy
      tags: [Workspaces]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "204":
          description: Workspace deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/workspaces/{workspace_id}/rules:
    get:
      operationId: listWorkspaceRules
      summary: List policy rules attached to a workspace
      tags: [Workspaces]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Rules for the workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceRulesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: addWorkspaceRule
      summary: Add or update a policy rule on a workspace
      tags: [Workspaces]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyRule"
      responses:
        "201":
          description: Upserted rule
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/templates:
    get:
      operationId: listPolicyTemplates
      summary: List built-in policy templates
      tags: [Templates]
      responses:
        "200":
          description: Template summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/templates/{template_id}:
    get:
      operationId: getPolicyTemplate
      summary: Get a built-in policy template with its workspace and rules
      tags: [Templates]
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full template definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/keys:
    get:
      operationId: listApiKeys
      summary: List all API keys (hashed, no raw keys returned) — admin scope
      tags: [Auth]
      responses:
        "200":
          description: Array of API key records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKeyRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/AdminScopeRequired"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createApiKey
      summary: Generate a new API key — admin scope
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyBody"
      responses:
        "201":
          description: Newly created API key (raw key shown only once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/AdminScopeRequired"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/auth/keys/{id}:
    delete:
      operationId: deleteApiKey
      summary: Revoke an API key (takes effect immediately) — admin scope
      tags: [Auth]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Key revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/AdminScopeRequired"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/webhooks:
    get:
      operationId: listWebhooks
      summary: List all registered webhooks — admin scope
      tags: [Webhooks]
      responses:
        "200":
          description: Array of webhook configurations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/AdminScopeRequired"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createWebhook
      summary: Register a new webhook endpoint — admin scope
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookBody"
      responses:
        "201":
          description: Registered webhook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/AdminScopeRequired"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/webhooks/{id}:
    delete:
      operationId: deleteWebhook
      summary: Unregister a webhook — admin scope
      tags: [Webhooks]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Webhook removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/AdminScopeRequired"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/webhooks/dlq:
    get:
      operationId: listWebhookDlq
      summary: List dead-lettered webhook deliveries — admin scope
      tags: [Webhooks]
      responses:
        "200":
          description: Array of dead-letter entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeadLetterEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/AdminScopeRequired"

  /v1/webhooks/dlq/{id}/retry:
    post:
      operationId: retryWebhookDlqEntry
      summary: Retry a dead-lettered webhook delivery — admin scope
      tags: [Webhooks]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Delivery re-enqueued
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/AdminScopeRequired"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/webhooks/dlq/{id}:
    delete:
      operationId: deleteWebhookDlqEntry
      summary: Discard a dead-lettered webhook delivery — admin scope
      tags: [Webhooks]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Entry removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/AdminScopeRequired"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/events/stream:
    get:
      operationId: subscribeEvents
      summary: Subscribe to real-time governance events via SSE
      tags: [Events]
      responses:
        "200":
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: Newline-delimited SSE frames with JSON event data
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/sessions:
    get:
      operationId: listSessions
      summary: List active session graphs
      tags: [Sessions]
      responses:
        "200":
          description: Array of session graph objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/sessions/{id}/metrics:
    get:
      operationId: getSessionMetrics
      summary: Get metrics for a specific session
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Session metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/nhi/identities:
    get:
      operationId: listNhiIdentities
      summary: List all registered non-human identities
      tags: [NHI]
      responses:
        "200":
          description: Array of NHI identity objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NhiIdentity"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: registerNhiIdentity
      summary: Register a new non-human identity with a cryptographic key pair
      tags: [NHI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterIdentityBody"
      responses:
        "201":
          description: Newly registered identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NhiIdentity"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/nhi/attest:
    post:
      operationId: attestAgent
      summary: Perform cryptographic attestation for an agent
      tags: [NHI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttestBody"
      responses:
        "200":
          description: Attestation result with signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttestationResult"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/nhi/challenge:
    post:
      operationId: createNhiChallenge
      summary: Create an attestation challenge for a registered agent
      tags: [NHI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agentId]
              properties:
                agentId:
                  type: string
      responses:
        "201":
          description: Challenge to be signed by the agent
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: Challenge object (challengeId, nonce, expiry)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/nhi/verify:
    post:
