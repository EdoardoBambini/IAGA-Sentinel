      description: >
        Drops feedback-learned adjustments. Weights are process-global across
        ALL agents on the instance, which is why resetting them requires an
        admin-scoped key.
      tags: [Risk]
      responses:
        "200":
          description: Weights restored to defaults
          content:
            application/json:
              schema:
                type: object
                required: [reset, weights]
                properties:
                  reset:
                    type: boolean
                  weights:
                    $ref: "#/components/schemas/RiskWeights"
        "401":
          $ref: "#/components/responses/Unauthorized"
