components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        API key passed as a Bearer token. Generate keys via POST /v1/auth/keys.

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique resource identifier
    ReviewId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Review request identifier
    AgentId:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
      description: Agent identifier
    WorkspaceId:
      name: workspace_id
      in: path
      required: true
      schema:
        type: string
      description: Workspace identifier
    FromDate:
      name: from_date
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: Inclusive lower bound on the event timestamp
    ToDate:
      name: to_date
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: Inclusive upper bound on the event timestamp
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
      description: Maximum number of rows returned

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Policy violation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AdminScopeRequired:
      description: >
        The presented API key has `agent` scope; this operation requires an
        `admin`-scoped key (error code `admin_scope_required`, 1.5.2).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ── Error ──
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable error code
          enum:
            - agent_not_found
            - workspace_not_found
            - policy_violation
            - storage_error
            - auth_required
            - invalid_api_key
            - admin_scope_required
            - invalid_request
            - review_not_found
            - internal_error
            - config_error
            - io_error
            - proxy_error
        message:
          type: string
          description: Human-readable error message

    # ── Health ──
    HealthResponse:
      type: object
      required: [ok, service, mode, version, authRequired, openMode, apiKeysConfigured]
      properties:
        ok:
          type: boolean
        service:
          type: string
          example: iaga-sentinel
        mode:
          type: string
          example: gateway
        version:
          type: string
          example: 1.5.2
        authRequired:
          type: boolean
          description: True unless open mode is on and no keys exist
        openMode:
          type: boolean
          description: IAGA_SENTINEL_OPEN_MODE=true
        apiKeysConfigured:
          type: boolean

    # ── Enums ──
    ProtocolKind:
      type: string
      enum: [mcp, acp, a2a, http-function, unknown]
      description: Agent communication protocol

    ActionType:
      type: string
      enum: [shell, file_read, file_write, http, db_query, email, custom]
      description: Category of tool action

    GovernanceDecision:
      type: string
      enum: [allow, review, block]
      description: Governance pipeline decision

    ReviewStatus:
      type: string
      enum: [not_required, pending, approved, rejected]
      description: Human review status

    AgentRole:
      type: string
      enum: [builder, researcher, operator]
      description: Agent role classification

    ReviewAction:
      type: string
      enum: [approved, rejected]
      description: Action to take on a review

    # ── Core Request / Response ──
    ActionDetail:
      type: object
      required: [type, toolName, payload]
      properties:
        type:
          $ref: "#/components/schemas/ActionType"
        toolName:
          type: string
          description: Name of the tool being invoked
        payload:
          type: object
          additionalProperties: true
          description: Arbitrary tool parameters

    InspectRequest:
      type: object
      required: [agentId, framework, action]
      properties:
        agentId:
          type: string
          description: Unique agent identifier
        tenantId:
          type: string
          description: Optional tenant scope
        workspaceId:
          type: string
          description: Optional workspace scope
        framework:
          type: string
          description: Agent framework name (e.g. langchain, autogen)
        protocol:
          $ref: "#/components/schemas/ProtocolKind"
        action:
          $ref: "#/components/schemas/ActionDetail"
        requestedSecrets:
          type: array
          items:
            type: string
          description: Secret names the agent wants injected
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary key-value metadata (e.g. `sessionId` for session correlation)
        usage:
          $ref: "#/components/schemas/UsageReport"

    UsageReport:
      type: object
      required: [provider, model]
      description: >
        1.5 cost-control: optional usage reported alongside the action, priced
        server-side into the receipt and audit cost ledger. A caller-supplied
        `costUsd` always wins over the server's pricing table.
      properties:
        provider:
          type: string
          example: anthropic
        model:
          type: string
          example: claude-sonnet-4-6
        promptTokens:
          type: integer
        completionTokens:
          type: integer
        totalTokens:
          type: integer
        costUsd:
          type: number
          format: double
          description: Caller-asserted cost in USD (overrides the pricing table)

    RiskScore:
      type: object
      required: [score, decision, reasons]
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: Numeric risk score (0-100)
        decision:
          $ref: "#/components/schemas/GovernanceDecision"
        reasons:
          type: array
          items:
            type: string

    SecretInjectionPlan:
      type: object
      required: [approved, denied]
      properties:
        approved:
          type: array
          items:
            type: string
        denied:
          type: array
          items:
            type: string

    SchemaValidation:
      type: object
      required: [toolName, valid, findings]
      properties:
        toolName:
          type: string
        valid:
          type: boolean
        findings:
          type: array
          items:
            type: string

    AuditEvent:
      type: object
      required: [eventId, agentId, framework, actionType, toolName, decision, timestamp, reasons]
      properties:
        eventId:
          type: string
          format: uuid
        agentId:
          type: string
        framework:
          type: string
        actionType:
          $ref: "#/components/schemas/ActionType"
        toolName:
          type: string
        decision:
          $ref: "#/components/schemas/GovernanceDecision"
        timestamp:
          type: string
          format: date-time
        reasons:
          type: array
          items:
            type: string

    StoredAuditEvent:
      type: object
      required: [eventId, agentId, framework, actionType, toolName, decision, timestamp, reasons, reviewStatus, riskScore]
      properties:
        eventId:
          type: string
          format: uuid
        agentId:
          type: string
        framework:
          type: string
        actionType:
          $ref: "#/components/schemas/ActionType"
        toolName:
          type: string
        decision:
          $ref: "#/components/schemas/GovernanceDecision"
        timestamp:
          type: string
          format: date-time
        reasons:
          type: array
          items:
            type: string
        reviewStatus:
          $ref: "#/components/schemas/ReviewStatus"
        riskScore:
          type: integer
          minimum: 0
        usage:
          type: object
          additionalProperties: true
          description: >
            1.5 cost-control: canonical usage/cost record (camelCase
            `UsageData`, integer micro-USD ledger). Absent when no usage was
            reported for the action.

    GovernanceResult:
      type: object
      required:
        - protocol
        - normalizedPayload
        - decision
        - reviewStatus
        - risk
        - secretPlan
        - auditEvent
        - profile
        - workspacePolicy
        - policyFindings
        - schemaValidation
      properties:
        protocol:
          $ref: "#/components/schemas/ProtocolKind"
        normalizedPayload:
          type: object
          additionalProperties: true
        decision:
          $ref: "#/components/schemas/GovernanceDecision"
        reviewStatus:
          $ref: "#/components/schemas/ReviewStatus"
        risk:
          $ref: "#/components/schemas/RiskScore"
        secretPlan:
          $ref: "#/components/schemas/SecretInjectionPlan"
        auditEvent:
          $ref: "#/components/schemas/AuditEvent"
        profile:
          $ref: "#/components/schemas/AgentProfile"
        workspacePolicy:
          $ref: "#/components/schemas/WorkspacePolicy"
        policyFindings:
          type: array
          items:
            type: string
        schemaValidation:
          $ref: "#/components/schemas/SchemaValidation"
        reviewRequestId:
          type: string
          format: uuid
        sessionGraph:
          description: L1 session graph data
        taintAnalysis:
          description: L2 taint tracking data
        adaptiveRisk:
          description: L4 adaptive risk scoring data
        sandboxResult:
          description: L5 sandbox execution result
        injectionFirewall:
          description: L7 injection firewall analysis
        policyVerification:
          description: L6 formal policy verification result
        telemetrySpan:
          description: L8 telemetry span reference

    # ── Reviews ──
    ReviewRequest:
      type: object
      required: [id, agentId, workspaceId, toolName, decision, status, riskScore, reasons, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        agentId:
          type: string
        workspaceId:
          type: string
        toolName:
          type: string
        decision:
          $ref: "#/components/schemas/GovernanceDecision"
        status:
          type: string
          description: Current review status (pending, approved, rejected)
        riskScore:
          type: integer
          minimum: 0
        reasons:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ReviewBody:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/ReviewAction"

    # ── Profiles & Policies ──
    AgentProfile:
      type: object
      required: [agentId, workspaceId, framework, role, approvedTools, approvedSecrets, baselineActionTypes]
      properties:
        agentId:
          type: string
        workspaceId:
          type: string
        framework:
          type: string
        role:
          $ref: "#/components/schemas/AgentRole"
        approvedTools:
          type: array
          items:
            type: string
        approvedSecrets:
          type: array
          items:
            type: string
        baselineActionTypes:
          type: array
          items:
            $ref: "#/components/schemas/ActionType"

    ToolPolicy:
      type: object
      required: [toolName, allowedActionTypes, maxDecision]
      properties:
        toolName:
          type: string
        allowedActionTypes:
          type: array
          items:
            $ref: "#/components/schemas/ActionType"
        maxDecision:
          $ref: "#/components/schemas/GovernanceDecision"
        requiresHumanReview:
          type: boolean
          default: false

    WorkspacePolicy:
      type: object
      required: [workspaceId, allowedProtocols, tools, allowedDomains]
      properties:
        workspaceId:
          type: string
        allowedProtocols:
          type: array
          items:
            $ref: "#/components/schemas/ProtocolKind"
        tools:
          type: array
          items:
            $ref: "#/components/schemas/ToolPolicy"
        allowedDomains:
          type: array
          items:
            type: string

    # ── Auth ──
    KeyScope:
      type: string
      enum: [admin, agent]
      description: >
        1.5.2 API-key scope. `admin` (default) has full access, identical to
        pre-1.5.2 keys; `agent` may drive the governance surface but not
        manage keys, webhooks, rate-limit config, threat intel, or plugins.

    ApiKeyRecord:
      type: object
      required: [id, label, createdAt, scope]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        createdAt:
          type: string
          format: date-time
        scope:
          $ref: "#/components/schemas/KeyScope"

    CreateApiKeyBody:
      type: object
      required: [label]
      properties:
        label:
          type: string
          description: Human-readable label for the key
        scope:
          $ref: "#/components/schemas/KeyScope"

    ApiKeyCreated:
      type: object
      required: [id, key, label, scope]
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          description: Raw API key (shown only once)
        label:
          type: string
        scope:
          $ref: "#/components/schemas/KeyScope"

    # ── Webhooks ──
    WebhookConfig:
      type: object
      required: [id, url, secret, eventFilter, createdAt, active]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        secret:
          type: string
        eventFilter:
          type: array
          items:
            type: string
            enum: [action_governed, review_created, review_resolved]
          description: Event types to receive. Empty array means all events.
        createdAt:
          type: string
          format: date-time
        active:
          type: boolean

    CreateWebhookBody:
      type: object
      required: [url, secret]
      properties:
        url:
          type: string
          format: uri
        secret:
          type: string
          description: Shared secret for HMAC-SHA256 signature verification
        event_filter:
          type: array
          items:
            type: string
          default: []

    # ── Sessions (L1) ──
    SessionInfo:
      type: object
      properties:
        sessionId:
          type: string
        agentId:
          type: string
        startedAt:
          type: string
          format: date-time
        nodeCount:
          type: integer
        edgeCount:
          type: integer

    SessionMetrics:
      type: object
      properties:
        sessionId:
          type: string
        totalActions:
          type: integer
        avgRiskScore:
          type: number
          format: float
        maxRiskScore:
          type: integer
        decisions:
          type: object
          properties:
            allow:
              type: integer
            review:
              type: integer
            block:
              type: integer

    # ── NHI (L3) ──
    NhiIdentity:
      type: object
      properties:
        agentId:
          type: string
        publicKey:
          type: string
          description: Hex-encoded HMAC-SHA256 public key
        workspaceId:
          type: string
        capabilities:
          type: array
          items:
            type: string
        registeredAt:
          type: string
          format: date-time

    RegisterIdentityBody:
      type: object
      required: [agentId]
      properties:
        agentId:
          type: string
        workspaceId:
          type: string
        capabilities:
          type: array
          items:
            type: string
          default: []

    AttestBody:
      type: object
      required: [agentId, challenge]
      properties:
        agentId:
          type: string
        challenge:
          type: string
          description: Challenge string to sign

    AttestationResult:
      type: object
      properties:
        agentId:
          type: string
        challenge:
          type: string
        signature:
          type: string
          description: Hex-encoded HMAC-SHA256 signature
        verified:
          type: boolean

    IssueTokenBody:
      type: object
      required: [agentId, capabilities]
      properties:
        agentId:
          type: string
        capabilities:
          type: array
          items:
            type: string
        ttlSeconds:
          type: integer
          default: 3600
          description: Token time-to-live in seconds

    CapabilityToken:
      type: object
      properties:
        tokenId:
          type: string
        agentId:
          type: string
        capabilities:
          type: array
          items:
            type: string
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        signature:
          type: string

    # ── Risk (L4) ──
    RiskWeights:
      type: object
      description: >
        Adaptive signal weights (normalized to sum 1). Process-global across
        ALL agents on the instance: feedback shifts them for everyone.
      required: [stat, context, behavioral, temporal, reputation]
      properties:
        stat:
          type: number
          format: double
        context:
          type: number
          format: double
        behavioral:
          type: number
          format: double
        temporal:
          type: number
          format: double
        reputation:
          type: number
          format: double

    FeedbackBody:
      type: object
      required: [feedback]
      properties:
        feedback:
          type: string
          description: Feedback signal (e.g. "too_strict", "too_lenient")

    RiskFeedbackResponse:
      type: object
      properties:
        applied:
          type: string
        weights:
          $ref: "#/components/schemas/RiskWeights"

    # ── Sandbox (L5) ──
    SandboxEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agentId:
          type: string
        toolName:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    # ── Policy Verification (L6) ──
    PolicyVerificationResult:
      type: object
      properties:
        workspaceId:
          type: string
        valid:
          type: boolean
        findings:
          type: array
          items:
            type: string
        conflictsDetected:
          type: boolean

    # ── Firewall (L7) ──
    FirewallScanBody:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Text to scan for prompt injection

    FirewallScanResult:
      type: object
      properties:
        clean:
          type: boolean
        threatLevel:
          type: string
          enum: [none, low, medium, high, critical]
        findings:
          type: array
          items:
            type: string
        patternsMatched:
          type: array
          items:
            type: string

    FirewallStats:
      type: object
      properties:
        totalScans:
          type: integer
        threatsDetected:
          type: integer
        threatsByLevel:
          type: object
          additionalProperties:
            type: integer

    # ── Telemetry (L8) ──
    TelemetrySpan:
      type: object
      properties:
        traceId:
          type: string
        spanId:
          type: string
        operationName:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        durationMs:
          type: number
        attributes:
          type: object
          additionalProperties: true

    TelemetryMetric:
      type: object
      properties:
        name:
          type: string
        value:
          type: number
        unit:
          type: string
        timestamp:
          type: string
          format: date-time
        attributes:
          type: object
          additionalProperties: true

    OtlpExportRecord:
      type: object
      properties:
        resourceSpans:
          type: array
          items:
            type: object
            additionalProperties: true
      description: OTLP-compatible export record

    # ── Demo ──
    DemoScenario:
      type: object
      required: [step, title, request]
      properties:
        step:
          type: string
        title:
          type: string
        request:
          $ref: "#/components/schemas/InspectRequest"

    DemoResult:
      type: object
      required: [step, title, decision, risk]
      properties:
        step:
          type: string
        title:
          type: string
        decision:
          $ref: "#/components/schemas/GovernanceDecision"
        risk:
          type: integer
          minimum: 0

    # ── Response Scanning ──
    ResponseScanRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Agent response text to scan for sensitive data
        agentId:
          type: string
          description: Optional agent ID for attribution

    ResponseScanResult:
      type: object
      properties:
        clean:
          type: boolean
          description: True if no sensitive data was detected
        findings:
          type: array
          items:
            type: object
            properties:
              patternName:
                type: string
              category:
                type: string
                enum: [pii, credential, secret, internal_path, custom]
              matchCount:
                type: integer
              severity:
                type: string
                enum: [low, medium, high, critical]

    SensitivePattern:
      type: object
      properties:
        name:
          type: string
          description: Human-readable pattern name
        category:
          type: string
          enum: [pii, credential, secret, internal_path, custom]
        description:
          type: string
        enabled:
          type: boolean

    # ── Rate Limiting ──
    RateLimitStatus:
      type: object
      properties:
        agentId:
          type: string
        allowed:
          type: boolean
          description: Whether the agent is currently within rate limits
        remaining:
          type: integer
          description: Remaining requests in the current window
        limit:
          type: integer
          description: Maximum requests per window
        resetAt:
          type: string
          format: date-time
          description: When the current rate limit window resets

    RateLimitConfig:
      type: object
      properties:
        requestsPerSecond:
          type: number
          format: float
          description: Maximum sustained requests per second
        burstSize:
          type: integer
          description: Maximum burst size above sustained rate
        windowSeconds:
          type: integer
          description: Sliding window duration in seconds
        cooldownSeconds:
          type: integer
          description: Cooldown period after limit is exceeded

    # ── Agent Fingerprinting ──
    AgentFingerprint:
      type: object
      properties:
        agentId:
          type: string
        toolDistribution:
          type: object
          additionalProperties:
            type: integer
          description: Map of tool names to usage counts
        actionTypeDistribution:
          type: object
          additionalProperties:
            type: integer
          description: Map of action types to usage counts
        avgTimeBetweenActions:
          type: number
          format: float
          description: Average time between actions in milliseconds
        totalActions:
          type: integer
        firstSeenAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        anomalyScore:
          type: number
          format: float
          description: Current anomaly score (0.0 = normal, 1.0 = highly anomalous)

    # ── Threat Intelligence ──
    ThreatIndicator:
      type: object
      required: [indicatorType, value]
      properties:
        id:
          type: string
          format: uuid
        indicatorType:
          type: string
          enum: [ip, domain, hash, url, pattern]
          description: Type of threat indicator
        value:
          type: string
          description: The indicator value (IP address, domain, hash, etc.)
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        source:
          type: string
          description: Where this indicator came from
        createdAt:
          type: string
          format: date-time

    ThreatIntelStats:
      type: object
      properties:
        totalIndicators:
          type: integer
        indicatorsByType:
          type: object
          additionalProperties:
            type: integer
        indicatorsBySeverity:
          type: object
          additionalProperties:
            type: integer
        totalChecks:
          type: integer
        totalMatches:
          type: integer

    ThreatIntelCheckRequest:
      type: object
      required: [value]
      properties:
        value:
          type: string
          description: Value to check against threat indicators
        indicatorType:
          type: string
          enum: [ip, domain, hash, url, pattern]
          description: Optional filter to check against specific indicator type

    ThreatIntelCheckResult:
      type: object
      properties:
        matched:
          type: boolean
        matchedIndicators:
          type: array
          items:
            $ref: "#/components/schemas/ThreatIndicator"

    # ── Audit stats & analytics ──
    AuditStats:
      type: object
      required: [totalEvents, decisions, topAgents, topTools, avgRiskScore]
      properties:
        totalEvents:
          type: integer
        decisions:
          type: object
          additionalProperties:
            type: integer
          description: Event count per decision (allow/review/block)
        topAgents:
          type: array
          items:
            type: array
            prefixItems:
              - type: string
              - type: integer
            description: "[agentId, eventCount] pair"
        topTools:
          type: array
          items:
            type: array
            prefixItems:
              - type: string
              - type: integer
            description: "[toolName, eventCount] pair"
        avgRiskScore:
          type: number
          format: double

    AgentAnalytics:
      type: object
      required: [agentId, totalRequests, decisions, avgRiskScore, topTools, lastActivity, trustScore]
      properties:
        agentId:
          type: string
        totalRequests:
          type: integer
        decisions:
          type: object
          additionalProperties:
            type: integer
        avgRiskScore:
          type: number
          format: double
        topTools:
          type: array
          items:
            type: array
            prefixItems:
              - type: string
              - type: integer
            description: "[toolName, useCount] pair"
        lastActivity:
          type: string
          format: date-time
        trustScore:
          type: number
          format: double

    # ── Webhook DLQ ──
    DeadLetterEntry:
      type: object
      required: [id, webhookId, webhookUrl, eventType, payload, error, attempts, failedAt]
      properties:
        id:
          type: string
        webhookId:
          type: string
        webhookUrl:
          type: string
          format: uri
        eventType:
          type: string
        payload:
          type: object
          additionalProperties: true
        error:
          type: string
        attempts:
          type: integer
        failedAt:
          type: string
          format: date-time

    # ── Templates & rules ──
    TemplateListResponse:
      type: object
      required: [templates, count]
      properties:
        templates:
          type: array
          items:
            type: object
            properties:
              templateId:
                type: string
              name:
                type: string
              description:
                type: string
              category:
                type: string
              builtin:
                type: boolean
              rulesCount:
                type: integer
              toolsCount:
                type: integer
        count:
          type: integer

    TemplateDetail:
      type: object
      properties:
        templateId:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        builtin:
          type: boolean
        workspace:
          $ref: "#/components/schemas/WorkspacePolicy"
        rules:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRule"

    PolicyRule:
      type: object
      required: [id, name, decision]
      properties:
        id:
          type: string
        name:
          type: string
        priority:
          type: integer
          default: 0
          description: Lower = evaluated first
        matchCriteria:
          type: object
          additionalProperties: true
          description: Criteria the request must match for the rule to apply
        conditions:
          type: object
          additionalProperties: true
          description: Additional conditions that must hold
        decision:
          $ref: "#/components/schemas/GovernanceDecision"
        reason:
          type: string
        enabled:
          type: boolean
          default: true

    WorkspaceRulesResponse:
      type: object
      required: [rules, count]
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRule"
        count:
          type: integer

    # ── Plugins ──
    PluginRegistrySnapshot:
      type: object
      required: [pluginDir, plugins, loadErrors, loadedCount]
      properties:
        pluginDir:
          type: string
        plugins:
          type: array
          items:
            type: object
            additionalProperties: true
            description: Plugin manifest (name, sha256, attestation when enabled)
        loadErrors:
          type: array
          items:
            type: object
            additionalProperties: true
        loadedCount:
          type: integer

    # ── Receipts (M2) ──
    ReceiptsListResponse:
      type: object
      required: [enabled, signerKeyId, policyHash, runs]
      properties:
        enabled:
          type: boolean
          description: False when the host was built/run without receipts
        signerKeyId:
          type: string
          description: Stable signer identity (`ed25519-<hex16>`)
        policyHash:
          type: string
          description: Hex SHA-256 of the active policy bundle
        runs:
          type: array
          items:
            type: object
            properties:
              runId:
                type: string
              receiptCount:
                type: integer
              firstTimestamp:
                type: string
              lastTimestamp:
                type: string
              terminalVerdict:
                $ref: "#/components/schemas/GovernanceDecision"

    ReceiptRunResponse:
      type: object
      required: [enabled, receipts]
      properties:
        enabled:
          type: boolean
        receipts:
          type: array
          items:
            type: object
            additionalProperties: true
            description: >
              Signed receipt (canonical snake_case body + hex Ed25519
              signature). The byte-exact schema is defined by
              `iaga-sentinel-receipts::ReceiptBody` and frozen by
              golden-vector tests.
        verify:
          type: object
          additionalProperties: true
          description: Chain verification outcome for the run

    # ── Cost control (1.5) ──
    CostSummaryResponse:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: False when compiled without `cost-control`
        summary:
          type: object
          properties:
            grossCostUsd:
              type: number
              format: double
              description: net + savings
            netCostUsd:
              type: number
              format: double
            savingsUsd:
              type: number
              format: double
            cacheHits:
              type: integer
            totalTokens:
              type: integer
            pricedActions:
              type: integer
          additionalProperties: true

    CostRowsResponse:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
            description: Aggregation row (key fields + costUsd/tokens counters)

    CostOverTimeResponse:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        bucket:
          type: string
          enum: [hour, day]
        rows:
          type: array
          items:
            type: object
            additionalProperties: true

    CostBudgetResponse:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        sessionLimitUsd:
          type: number
          format: double
          nullable: true
          description: IAGA_SENTINEL_SESSION_BUDGET_USD, null when unset

    CostPricingResponse:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        pricing:
          type: object
          additionalProperties: true
          description: Active PricingTable (providers → model → per-Mtok USD rates)
        builtinEffectiveDate:
          type: string
          format: date
          description: Date the BUILT-IN price list was last verified (1.5.2)

    # ── Pillar status ──
    PolicyOverlayStatus:
      type: object
      required: [enabled, loaded, policyCount]
      properties:
        enabled:
          type: boolean
          description: False when compiled without the `dictum` feature
        loaded:
          type: boolean
        policyCount:
          type: integer
        policyHash:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
          description: Path of the loaded .dictum bundle

    ReasoningStatus:
      type: object
      required: [enabled, engine, models, mlFeatureCompiled]
      properties:
        enabled:
          type: boolean
        engine:
          type: string
          example: tract
        models:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              sha256:
                type: string
        mlFeatureCompiled:
          type: boolean

    KernelStatus:
      type: object
      required: [enabled, backend, authoritative, linuxBpfScaffold]
      properties:
        enabled:
          type: boolean
        backend:
          type: string
          example: userspace
        authoritative:
          type: boolean
          description: >
            Honest posture flag: always false in the open build (userspace
            soft enforcement; the eBPF/LSM scaffold has no loader).
        linuxBpfScaffold:
          type: boolean
